<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PO Intake Agent</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>PO Intake Agent</h1>
    <button id="workflow-toggle" class="drawer-toggle" type="button" aria-controls="workflow-drawer" aria-expanded="false">Agent Workflow ▸</button>
  </header>
  <main class="cols">
    <section class="col" id="col-pdf">
      <h2>Original PO</h2>
      <input type="file" id="pdf-input" accept="application/pdf" hidden />
      <label id="dropzone" for="pdf-input">
        <div class="dz-icon" aria-hidden="true">⤓</div>
        <div class="dz-title">拖入 PDF 或点击上传</div>
        <div class="dz-sub">采购订单 · PDF 格式</div>
      </label>
      <button type="button" id="btn-demo">加载演示单据 · 不调用 API（免费）</button>
      <div id="preview-wrap" hidden>
        <button type="button" id="btn-change-pdf" class="btn-text">更换 PDF</button>
        <iframe id="pdf-preview" title="PDF preview"></iframe>
      </div>
    </section>

    <section class="col" id="col-draft">
      <h2>Order Draft</h2>
      <form id="draft-form">
        <div class="header-fields">
          <label>Customer <input name="customer" /></label>
          <label>PO Number <input name="po_number" /></label>
          <label>Ship To <input name="ship_to" /></label>
          <label>Ship From <input name="ship_from_warehouse" /></label>
          <label>Ship Date <input name="ship_date" /></label>
          <label>Carrier <input name="carrier" /></label>
        </div>
        <div class="order-total">Order Total: <span id="order-total">—</span></div>
        <label>Order note <input name="order_note" /></label>
        <div class="status">Status: <span id="status">—</span></div>
        <div class="actions">
          <button type="button" id="btn-revise" class="btn-text">Revise</button>
          <button type="button" id="btn-save" class="btn-secondary">Save</button>
          <button type="button" id="btn-release" class="btn-primary">Release to Warehouse</button>
        </div>
      </form>
    </section>

    <section class="col" id="col-items">
      <h2>Items</h2>
      <div id="items"></div>
    </section>
  </main>
  <div id="drawer-overlay" hidden></div>
  <aside id="workflow-drawer" aria-hidden="true">
    <h2>Agent Workflow</h2>
    <ol id="steps"></ol>
  </aside>
  <div id="toast-host" aria-live="polite"></div>
  <script src="/static/app.js"></script>
</body>
</html>
